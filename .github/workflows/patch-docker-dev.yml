name: Patch Docker Image

on:
  workflow_dispatch:
    inputs:
      commits:
        description: "Comma-separated commit SHAs to cherry-pick (e.g. abc123,def456)"
        required: false
        default: ""
      image_tag:
        description: "Base image tag to patch (e.g. dev-x86, dev-x86-cu13)"
        required: true

concurrency:
  group: patch-docker-${{ inputs.image_tag }}
  cancel-in-progress: true

jobs:
  patch:
    if: github.repository == 'sgl-project/sglang'
    runs-on: x64-docker-build-node
    timeout-minutes: 60
    steps:
      - name: Validate inputs
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if ! [[ "${IMAGE_TAG}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid image_tag: ${IMAGE_TAG}"
            exit 1
          fi
          if [ -n "${{ inputs.commits }}" ]; then
            IFS=',' read -ra SHAS <<< "${{ inputs.commits }}"
            for sha in "${SHAS[@]}"; do
              sha=$(echo "${sha}" | xargs)
              if ! [[ "${sha}" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
                echo "::error::Invalid commit SHA: ${sha}"
                exit 1
              fi
            done
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull base image and start container
        run: |
          IMAGE="lmsysorg/sglang:${{ inputs.image_tag }}"
          docker pull "${IMAGE}"

          # Start a long-running container so we can exec into it
          CONTAINER_ID=$(docker run -d "${IMAGE}" sleep infinity)
          echo "CONTAINER_ID=${CONTAINER_ID}" >> "$GITHUB_ENV"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

          # Extract and validate the base commit SHA
          BASE_SHA=$(docker exec "${CONTAINER_ID}" \
            git -C /sgl-workspace/sglang rev-parse HEAD 2>/dev/null \
            | tr -d '[:space:]') || true
          if [ -z "${BASE_SHA}" ]; then
            echo "::error::Image has no .git directory — cannot apply changes"
            docker rm -f "${CONTAINER_ID}"
            exit 1
          fi
          echo "Image built from commit: ${BASE_SHA}"
          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"

      - name: Apply changes
        run: |
          set -eo pipefail
          REPO_URL="https://github.com/sgl-project/sglang.git"
          GIT=(git -C /sgl-workspace/sglang)

          # Configure git identity for cherry-pick/merge commits inside the container
          docker exec "${CONTAINER_ID}" "${GIT[@]}" config user.email "ci@sglang.ai"
          docker exec "${CONTAINER_ID}" "${GIT[@]}" config user.name "SGLang CI"

          # Ensure the remote points to the canonical repo
          docker exec "${CONTAINER_ID}" bash -c \
            "cd /sgl-workspace/sglang && git remote set-url origin '${REPO_URL}' 2>/dev/null || git remote add origin '${REPO_URL}'"

          if [ -n "${{ inputs.commits }}" ]; then
            # --- Cherry-pick mode: apply specific commits ---
            # Conflicts are auto-resolved in favour of the cherry-picked commit.
            APPLIED=0
            IFS=',' read -ra SHAS <<< "${{ inputs.commits }}"
            for sha in "${SHAS[@]}"; do
              sha=$(echo "${sha}" | xargs)
              echo "=== Cherry-picking ${sha} ==="

              # Fetch this specific commit (works for any SHA on GitHub, not just main)
              docker exec "${CONTAINER_ID}" "${GIT[@]}" fetch origin "${sha}"

              # Verify the object actually exists after fetch
              if ! docker exec "${CONTAINER_ID}" "${GIT[@]}" cat-file -e "${sha}^{commit}" 2>/dev/null; then
                echo "::error::Commit ${sha} not found — verify the SHA exists in the repo"
                exit 1
              fi

              # Reject merge commits — cherry-pick requires -m which is ambiguous for patching
              PARENT_COUNT=$(docker exec "${CONTAINER_ID}" "${GIT[@]}" cat-file -p "${sha}" \
                | grep -c '^parent' || true)
              if [ "${PARENT_COUNT}" -gt 1 ]; then
                echo "::error::Commit ${sha} is a merge commit — supply the individual commit SHAs instead"
                exit 1
              fi

              # Skip if this commit is already in the image's history
              if docker exec "${CONTAINER_ID}" "${GIT[@]}" merge-base --is-ancestor "${sha}" HEAD 2>/dev/null; then
                echo "  ${sha} is already in the image — skipping"
                continue
              fi

              docker exec "${CONTAINER_ID}" "${GIT[@]}" cherry-pick "${sha}" \
                --strategy=ort --strategy-option=theirs --no-edit
              APPLIED=$((APPLIED + 1))
            done

            if [ "${APPLIED}" -eq 0 ]; then
              echo "::warning::All commits already in image — nothing to do"
              echo "SKIP_PUSH=true" >> "$GITHUB_ENV"
            else
              echo "Applied ${APPLIED} commit(s)"
            fi
          else
            # --- Main mode: merge to latest main ---
            # Conflicts are auto-resolved in favour of main's version.
            echo "=== Merging latest main ==="
            docker exec "${CONTAINER_ID}" "${GIT[@]}" fetch origin main

            NEW_COMMITS=$(docker exec "${CONTAINER_ID}" \
              "${GIT[@]}" rev-list HEAD..origin/main --count \
              | tr -d '[:space:]')
            NEW_COMMITS="${NEW_COMMITS:-0}"

            if [ "${NEW_COMMITS}" -eq 0 ]; then
              echo "::warning::Image is already up to date with main"
              echo "SKIP_PUSH=true" >> "$GITHUB_ENV"
            else
              echo "${NEW_COMMITS} new commits to apply"
              docker exec "${CONTAINER_ID}" "${GIT[@]}" merge origin/main \
                --strategy=ort --strategy-option=theirs --no-edit -m "Merge main (catch-up)"
            fi
          fi

      - name: Commit and push image
        if: env.SKIP_PUSH != 'true'
        run: |
          # Snapshot the container as the new image and push
          docker commit "${CONTAINER_ID}" "${IMAGE}"
          docker push "${IMAGE}"

          echo "### Patched \`${IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Base commit:** \`${BASE_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          NEW_SHA=$(docker exec "${CONTAINER_ID}" \
            git -C /sgl-workspace/sglang rev-parse HEAD \
            | tr -d '[:space:]')
          echo "- **New commit:** \`${NEW_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source:** ${{ inputs.commits && format('commits: {0}', inputs.commits) || 'latest main' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: |
          if [ -n "${CONTAINER_ID}" ]; then
            docker rm -f "${CONTAINER_ID}" || true
          fi
