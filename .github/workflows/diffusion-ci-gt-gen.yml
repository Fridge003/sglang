name: Diffusion CI Ground Truth Generation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        default: ''
        type: string
      case_ids:
        description: 'Specific case IDs to run (space-separated, optional)'
        required: false
        default: ''
        type: string
      output_name:
        description: 'Custom output folder name (also used for artifact names and publish target dir). Leave empty to use defaults.'
        required: false
        default: ''
        type: string
      generator_backend:
        description: 'GT generator backend: official uses upstream Diffusers/official pipelines; sglang reuses SGLang server tests.'
        required: false
        default: 'official'
        type: choice
        options:
          - official
          - sglang
      kernel_artifact_run_id:
        description: "Optional sgl-kernel wheel source: GitHub Actions run ID of a pr-test.yml run on the SAME commit as 'ref' that uploaded wheel-python3.10-cuda13.0. Use only when this branch's torch/ABI change makes the PyPI sglang-kernel wheel incompatible. Find it under Actions > pr-test; artifacts expire after 90 days."
        required: false
        default: ''
        type: string
      revert_ci_data_commits:
        description: 'Emergency only: space-separated sglang-ci-data commit SHAs to revert. Generation jobs are skipped when set.'
        required: false
        default: ''
        type: string
      publish_test_bundle_source_owner:
        description: 'Test-bundle publish only: source owner containing the prepared sglang-ci-data branch.'
        required: false
        default: ''
        type: string
      publish_test_bundle_source_repo:
        description: 'Test-bundle publish only: source repository name.'
        required: false
        default: 'sglang-ci-data'
        type: string
      publish_test_bundle_source_branch:
        description: 'Test-bundle publish only: source branch containing the prepared bundle.'
        required: false
        default: ''
        type: string
      publish_test_bundle_path:
        description: 'Test-bundle publish only: bundle path to copy into sglang-bot/sglang-ci-data.'
        required: false
        default: ''
        type: string
      publish_test_bundle_target_branch:
        description: 'Test-bundle publish only: target branch to create in sglang-bot/sglang-ci-data.'
        required: false
        default: ''
        type: string

concurrency:
  group: diffusion-ci-gt-gen-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  SGLANG_IS_IN_CI: true
  SGLANG_CUDA_COREDUMP: "1"
  OUTPUT_NAME: ${{ inputs.output_name || 'diffusion-ci-outputs' }}

jobs:
  revert-ci-data:
    if: github.repository == 'sgl-project/sglang' && inputs.revert_ci_data_commits != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Revert sglang-ci-data commits
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          REVERT_COMMITS: ${{ inputs.revert_ci_data_commits }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import sys

          commits = os.environ["REVERT_COMMITS"].split()
          if not commits:
              sys.exit("No commits provided")
          bad = [commit for commit in commits if not re.fullmatch(r"[0-9a-fA-F]{7,40}", commit)]
          if bad:
              sys.exit(f"Invalid commit SHAs: {bad}")
          with open("/tmp/revert-commits", "w", encoding="utf-8") as f:
              f.write("\n".join(commits) + "\n")
          PY

          git clone --filter=blob:none --sparse \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/sglang-bot/sglang-ci-data.git" ci-data
          cd ci-data
          git sparse-checkout set diffusion-ci/consistency_gt
          git config user.name "sglang-bot"
          git config user.email "sglangbot@gmail.com"
          mapfile -t commits < /tmp/revert-commits
          git revert --no-edit "${commits[@]}"
          git push origin main

  publish-test-bundle-to-ci-data:
    if: github.repository == 'sgl-project/sglang' && inputs.publish_test_bundle_path != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Copy test bundle to sglang-ci-data branch
        env:
          GH_PAT_FOR_NIGHTLY_CI_DATA: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          SOURCE_OWNER: ${{ inputs.publish_test_bundle_source_owner }}
          SOURCE_REPO: ${{ inputs.publish_test_bundle_source_repo }}
          SOURCE_BRANCH: ${{ inputs.publish_test_bundle_source_branch }}
          BUNDLE_PATH: ${{ inputs.publish_test_bundle_path }}
          TARGET_BRANCH: ${{ inputs.publish_test_bundle_target_branch }}
        run: |
          set -euo pipefail

          if [ -z "${GH_PAT_FOR_NIGHTLY_CI_DATA}" ]; then
            echo "GH_PAT_FOR_NIGHTLY_CI_DATA is not set"
            exit 1
          fi
          if [ -z "${SOURCE_OWNER}" ] || [ -z "${SOURCE_BRANCH}" ] || [ -z "${BUNDLE_PATH}" ] || [ -z "${TARGET_BRANCH}" ]; then
            echo "Missing required publish_test_bundle_* input"
            exit 1
          fi

          git config --global user.name "sglang-bot"
          git config --global user.email "sglangbot@gmail.com"

          git clone --filter=blob:none --sparse \
            "https://x-access-token:${GH_PAT_FOR_NIGHTLY_CI_DATA}@github.com/sglang-bot/sglang-ci-data.git" ci-data
          cd ci-data
          git sparse-checkout set "${BUNDLE_PATH}"
          git fetch origin "${TARGET_BRANCH}" || true
          if git rev-parse --verify "origin/${TARGET_BRANCH}" >/dev/null 2>&1; then
            git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          else
            git checkout -b "${TARGET_BRANCH}" origin/main
          fi

          git remote add source "https://github.com/${SOURCE_OWNER}/${SOURCE_REPO}.git"
          git fetch --depth=1 source "${SOURCE_BRANCH}"
          git checkout FETCH_HEAD -- "${BUNDLE_PATH}"

          changed_files="$(git diff --name-only --cached)"
          if [ -z "${changed_files}" ]; then
            echo "No changes staged from ${SOURCE_OWNER}/${SOURCE_REPO}:${SOURCE_BRANCH}:${BUNDLE_PATH}"
            exit 1
          fi
          invalid_files="$(printf '%s\n' "${changed_files}" | grep -v "^${BUNDLE_PATH}/" || true)"
          if [ -n "${invalid_files}" ]; then
            echo "Refusing to publish files outside ${BUNDLE_PATH}:"
            printf '%s\n' "${invalid_files}"
            exit 1
          fi

          git commit -m "Add official diffusion GT test bundle"
          git push origin "HEAD:${TARGET_BRANCH}"

  multimodal-diffusion-gen-1gpu:
    if: github.repository == 'sgl-project/sglang' && inputs.revert_ci_data_commits == '' && inputs.publish_test_bundle_path == ''
    runs-on: 1-gpu-h100
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Prepare sgl-kernel/dist for prebuilt wheel
        if: inputs.kernel_artifact_run_id != ''
        run: |
          ls -alh sgl-kernel/dist || true
          rm -rf sgl-kernel/dist/* || true

      - name: Download prebuilt sgl-kernel wheel
        if: inputs.kernel_artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          path: sgl-kernel/dist/
          merge-multiple: true
          name: wheel-python3.10-cuda13.0
          run-id: ${{ inputs.kernel_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          CUSTOM_BUILD_SGL_KERNEL="${{ inputs.kernel_artifact_run_id != '' && 'true' || 'false' }}" \
            bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Generate outputs
        env:
          RUNAI_STREAMER_MEMORY_LIMIT: 0
        run: |
          cd python
          if [ "${{ inputs.generator_backend }}" = "official" ]; then
            python -m sglang.multimodal_gen.test.scripts.gen_official_diffusion_gt \
              --suite 1-gpu \
              --partition-id ${{ matrix.part }} \
              --total-partitions 2 \
              --cpu-offload \
              --out-dir ./${{ env.OUTPUT_NAME }} \
              ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}
          else
            python -m sglang.multimodal_gen.test.scripts.gen_diffusion_ci_outputs \
              --suite 1-gpu \
              --partition-id ${{ matrix.part }} \
              --total-partitions 2 \
              --out-dir ./${{ env.OUTPUT_NAME }} \
              ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}-1gpu-part${{ matrix.part }}
          path: python/${{ env.OUTPUT_NAME }}
          if-no-files-found: warn
          retention-days: 7

      - name: Publish GT images to sglang-bot/sglang-ci-data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
        run: |
          python scripts/ci/utils/diffusion/publish_diffusion_gt.py \
            --source-dir python/${{ env.OUTPUT_NAME }} \
            ${{ inputs.output_name != '' && format('--target-dir diffusion-ci/{0}', inputs.output_name) || '' }}

  multimodal-diffusion-gen-2gpu:
    if: github.repository == 'sgl-project/sglang' && inputs.revert_ci_data_commits == '' && inputs.publish_test_bundle_path == ''
    runs-on: 2-gpu-h100
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Prepare sgl-kernel/dist for prebuilt wheel
        if: inputs.kernel_artifact_run_id != ''
        run: |
          ls -alh sgl-kernel/dist || true
          rm -rf sgl-kernel/dist/* || true

      - name: Download prebuilt sgl-kernel wheel
        if: inputs.kernel_artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          path: sgl-kernel/dist/
          merge-multiple: true
          name: wheel-python3.10-cuda13.0
          run-id: ${{ inputs.kernel_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          CUSTOM_BUILD_SGL_KERNEL="${{ inputs.kernel_artifact_run_id != '' && 'true' || 'false' }}" \
            bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Generate outputs
        env:
          RUNAI_STREAMER_MEMORY_LIMIT: 0
        run: |
          cd python
          if [ "${{ inputs.generator_backend }}" = "official" ]; then
            python -m sglang.multimodal_gen.test.scripts.gen_official_diffusion_gt \
              --suite 2-gpu \
              --partition-id ${{ matrix.part }} \
              --total-partitions 2 \
              --out-dir ./${{ env.OUTPUT_NAME }} \
              ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}
          else
            python -m sglang.multimodal_gen.test.scripts.gen_diffusion_ci_outputs \
              --suite 2-gpu \
              --partition-id ${{ matrix.part }} \
              --total-partitions 2 \
              --out-dir ./${{ env.OUTPUT_NAME }} \
              ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}-2gpu-part${{ matrix.part }}
          path: python/${{ env.OUTPUT_NAME }}
          if-no-files-found: warn
          retention-days: 7

      - name: Publish GT images to sglang-bot/sglang-ci-data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
        run: |
          python scripts/ci/utils/diffusion/publish_diffusion_gt.py \
            --source-dir python/${{ env.OUTPUT_NAME }} \
            ${{ inputs.output_name != '' && format('--target-dir diffusion-ci/{0}', inputs.output_name) || '' }}

  multimodal-diffusion-gen-b200:
    if: github.repository == 'sgl-project/sglang' && inputs.revert_ci_data_commits == '' && inputs.publish_test_bundle_path == ''
    runs-on: 4-gpu-b200
    timeout-minutes: 240
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Prepare sgl-kernel/dist for prebuilt wheel
        if: inputs.kernel_artifact_run_id != ''
        run: |
          ls -alh sgl-kernel/dist || true
          rm -rf sgl-kernel/dist/* || true

      - name: Download prebuilt sgl-kernel wheel
        if: inputs.kernel_artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          path: sgl-kernel/dist/
          merge-multiple: true
          name: wheel-python3.10-cuda13.0
          run-id: ${{ inputs.kernel_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          CUSTOM_BUILD_SGL_KERNEL="${{ inputs.kernel_artifact_run_id != '' && 'true' || 'false' }}" \
            bash scripts/ci/cuda/ci_install_dependency.sh diffusion

      - name: Generate outputs
        env:
          RUNAI_STREAMER_MEMORY_LIMIT: 0
        run: |
          cd python
          if [ "${{ inputs.generator_backend }}" = "official" ]; then
            python -m sglang.multimodal_gen.test.scripts.gen_official_diffusion_gt \
              --suite 1-gpu-b200 \
              --out-dir ./${{ env.OUTPUT_NAME }} \
              ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}
          else
            python -m sglang.multimodal_gen.test.scripts.gen_diffusion_ci_outputs \
              --suite 1-gpu-b200 \
              --out-dir ./${{ env.OUTPUT_NAME }} \
              ${{ inputs.case_ids != '' && format('--case-ids {0}', inputs.case_ids) || '' }}
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}-b200
          path: python/${{ env.OUTPUT_NAME }}
          if-no-files-found: warn
          retention-days: 7

      - name: Publish GT images to sglang-bot/sglang-ci-data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
        run: |
          python scripts/ci/utils/diffusion/publish_diffusion_gt.py \
            --source-dir python/${{ env.OUTPUT_NAME }} \
            ${{ inputs.output_name != '' && format('--target-dir diffusion-ci/{0}', inputs.output_name) || '' }}
