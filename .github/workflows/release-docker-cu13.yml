name: Build and Push CUDA 13 Docker Images

on:
    workflow_dispatch:
jobs:
    build-dev:
        if: ${{ github.repository == 'sgl-project/sglang' }}
        runs-on: ${{ matrix.runner }}
        strategy:
            matrix:
                include:
                    - runner: x64-docker-build-node
                      platform: linux/amd64
                      build_type: all
                      grace_blackwell: 0
                      tag: dev-x86-cu13
                      version: 13.0.1
                      kernel_artifact: wheel-python3.12-cuda13.0
                    - runner: arm-docker-build-node
                      platform: linux/arm64
                      build_type: all
                      grace_blackwell: 1
                      tag: dev-arm64-cu13
                      version: 13.0.1
                      kernel_artifact: wheel-python3.12-cuda13.0-aarch64
        steps:
            - name: Delete huge unnecessary tools folder
              run: rm -rf /opt/hostedtoolcache

            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download sgl-kernel wheel from artifacts
              uses: actions/download-artifact@v4
              with:
                  name: ${{ matrix.kernel_artifact }}
                  path: docker/wheels/
                  run-id: "22370608070"
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Free disk space
              uses: jlumbroso/free-disk-space@main
              with:
                  tool-cache: true
                  docker-images: true
                  android: true
                  dotnet: true
                  haskell: true
                  large-packages: true
                  swap-storage: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Dev Image
              run: |
                  docker buildx build \
                    --platform ${{ matrix.platform }} \
                    --push \
                    --target framework \
                    -f docker/Dockerfile \
                    --build-arg CUDA_VERSION=${{ matrix.version }} \
                    --build-arg BUILD_TYPE=${{ matrix.build_type }} \
                    --build-arg BRANCH_TYPE=local \
                    --build-arg CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
                    --build-arg GRACE_BLACKWELL=${{ matrix.grace_blackwell }} \
                    --build-arg INSTALL_FLASHINFER_JIT_CACHE=1 \
                    -t lmsysorg/sglang:${{ matrix.tag }} \
                    --no-cache \
                    .

    create-manifests:
        runs-on: ubuntu-22.04
        needs: [build-dev]
        if: ${{ github.repository == 'sgl-project/sglang' }}
        strategy:
            matrix:
                variant:
                    - tag: dev-cu13
                      x86_tag: dev-x86-cu13
                      arm64_tag: dev-arm64-cu13
        steps:
            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - run: |
                  docker buildx imagetools create \
                    -t lmsysorg/sglang:${{ matrix.variant.tag }} \
                    -t lmsysorg/sglang:nightly-${{ matrix.variant.tag }}-$(date +%Y%m%d)-${GITHUB_SHA:0:8} \
                    lmsysorg/sglang:${{ matrix.variant.x86_tag }} \
                    lmsysorg/sglang:${{ matrix.variant.arm64_tag }}
