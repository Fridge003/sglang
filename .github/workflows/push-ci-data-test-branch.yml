name: Push CI Data Test Branch

on:
  workflow_dispatch:
    inputs:
      source_owner:
        description: "Source owner containing the prepared sglang-ci-data branch"
        required: true
        default: "mickqian"
      source_repo:
        description: "Source repository name"
        required: true
        default: "sglang-ci-data"
      source_branch:
        description: "Source branch containing the prepared bundle"
        required: true
        default: "official-gt-test-20260425"
      bundle_path:
        description: "Bundle path to copy into sglang-bot/sglang-ci-data"
        required: true
        default: "diffusion-ci/official-gt-test-20260425"
      target_branch:
        description: "Target branch to create in sglang-bot/sglang-ci-data"
        required: true
        default: "official-gt-test-20260425"

permissions:
  contents: read

jobs:
  push-ci-data-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Copy test bundle to sglang-ci-data branch
        env:
          GH_PAT_FOR_NIGHTLY_CI_DATA: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          SOURCE_OWNER: ${{ inputs.source_owner }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          BUNDLE_PATH: ${{ inputs.bundle_path }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail

          if [ -z "${GH_PAT_FOR_NIGHTLY_CI_DATA}" ]; then
            echo "GH_PAT_FOR_NIGHTLY_CI_DATA is not set"
            exit 1
          fi

          git config --global user.name "sglang-bot"
          git config --global user.email "sglang-bot@users.noreply.github.com"

          git clone "https://x-access-token:${GH_PAT_FOR_NIGHTLY_CI_DATA}@github.com/sglang-bot/sglang-ci-data.git" ci-data
          cd ci-data
          git checkout -b "${TARGET_BRANCH}" origin/main

          git remote add source "https://github.com/${SOURCE_OWNER}/${SOURCE_REPO}.git"
          git fetch --depth=1 source "${SOURCE_BRANCH}"
          git checkout FETCH_HEAD -- "${BUNDLE_PATH}"

          changed_files="$(git diff --name-only --cached)"
          if [ -z "${changed_files}" ]; then
            echo "No changes staged from ${SOURCE_OWNER}/${SOURCE_REPO}:${SOURCE_BRANCH}:${BUNDLE_PATH}"
            exit 1
          fi
          invalid_files="$(printf '%s\n' "${changed_files}" | grep -v "^${BUNDLE_PATH}/" || true)"
          if [ -n "${invalid_files}" ]; then
            echo "Refusing to publish files outside ${BUNDLE_PATH}:"
            printf '%s\n' "${invalid_files}"
            exit 1
          fi

          git commit -m "Add official diffusion GT test bundle"
          git push origin "HEAD:${TARGET_BRANCH}"
