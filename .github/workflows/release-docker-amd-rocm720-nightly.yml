name: Release Docker Images ROCm 7.2.0 Nightly Preview (AMD)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

concurrency:
  # A PR number if a pull request and otherwise the commit hash. This cancels
  # queued and in-progress runs for the same PR (presubmit) or commit
  # (postsubmit). The workflow name is prepended to avoid conflicts between
  # different workflows.
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: True

jobs:
  publish:
    if: github.repository == 'sgl-project/sglang'
    runs-on: amd-docker-scale
    environment: 'prod'
    strategy:
      fail-fast: false
      matrix:
        gpu_arch: ['gfx942-rocm720', 'gfx950-rocm720']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git describe to find tags

      - name: Resolve test image tag
        run: |
          # Temporary publish test: reuse an existing image instead of building.
          if [ "${{ matrix.gpu_arch }}" = "gfx942-rocm720" ]; then
            rocm_tag="rocm720-mi30x"
          elif [ "${{ matrix.gpu_arch }}" = "gfx950-rocm720" ]; then
            rocm_tag="rocm720-mi35x"
          else
            echo "Unsupported gfx arch"
            exit 1
          fi

          echo "IMAGE_TAG=v0.5.10rc0-${rocm_tag}-20260413" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_AMD_USERNAME }}
          password: ${{ secrets.DOCKERHUB_AMD_TOKEN }}

      - name: Pull test image from rocm/sgl-dev
        run: |
          docker pull rocm/sgl-dev:${{ env.IMAGE_TAG }}

      - name: Push rocm/sgl-dev to local registry
        run: |
          docker tag rocm/sgl-dev:${{ env.IMAGE_TAG }} 172.29.8.23:5000/rocm/sgl-dev:${{ env.IMAGE_TAG }}
          docker push 172.29.8.23:5000/rocm/sgl-dev:${{ env.IMAGE_TAG }}
